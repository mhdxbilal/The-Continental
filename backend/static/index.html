<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Continental - Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .toast { transition: opacity 0.3s ease-in-out; }
        body.high-contrast { background-color: #000; color: #fff; }
        body.high-contrast .glass { background: #000; border: 2px solid #fff; box-shadow: none; }
        body.high-contrast input, body.high-contrast select, body.high-contrast textarea { background: #000; border: 1px solid #fff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="toast" class="toast opacity-0 fixed top-4 right-4 bg-gray-800 border border-gray-700 text-white px-4 py-3 rounded shadow-lg z-50 pointer-events-none">
        <span id="toastMsg">Notification</span>
    </div>

    <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-100">Universal Downloader</h1>
            <div class="flex gap-2">
                <button onclick="openSettings()" title="Configure downloader settings" class="p-2 text-gray-400 hover:text-white transition-colors border border-gray-700 rounded-lg bg-[#121212] hover:bg-gray-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <button onclick="toggleTheme()" title="Switch between high-contrast and normal themes" class="p-2 text-gray-400 hover:text-white transition-colors border border-gray-700 rounded-lg bg-[#121212] hover:bg-gray-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-400 text-sm mb-2">Download Directory</label>
            <input type="text" id="dirInput" placeholder="/storage/emulated/0/Download" class="w-full bg-[#121212] border border-gray-700 text-white rounded-lg p-3 outline-none focus:border-blue-500 transition-colors">
        </div>

        <div class="flex flex-col gap-4">
            <textarea id="urlInput" rows="3" placeholder="Enter URLs (one per line)..." class="w-full bg-[#121212] border border-gray-700 text-white rounded-lg p-3 outline-none focus:border-blue-500 transition-colors resize-none"></textarea>

            <select id="formatInput" class="w-full bg-[#121212] border border-gray-700 text-white rounded-lg p-3 outline-none focus:border-blue-500 transition-colors">
                <option value="bestvideo+bestaudio/best">Best Quality (Default)</option>
                <option value="bestaudio/best">Audio Only</option>
            </select>
            
            <button onclick="startDownload()" id="btnDownload" title="Start downloading the provided URLs" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg shadow-blue-500/30 mt-2" disabled>
                Initiate Sequence
            </button>
        </div>

        <!-- Dashboard Summary Header -->
        <div id="dashboardSummary" class="hidden bg-gray-800 p-4 rounded-lg flex justify-between items-center mb-4 mt-8 border border-gray-700">
             <div class="text-sm">
                 <div class="text-gray-400">Total Speed</div>
                 <div class="font-bold text-xl text-blue-400" id="dashTotalSpeed">0.00 MB/s</div>
             </div>
             <div class="text-sm text-right">
                 <div class="text-gray-400">Active / Queued</div>
                 <div class="font-bold text-xl text-yellow-400" id="dashActiveCount">0 / 0</div>
             </div>
        </div>
        
        <div id="progressContainer" class="mt-4 hidden space-y-4">
        </div>
        <div id="historyContainer" class="mt-8 border-t border-gray-800 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-200">Download History</h2>
                <div class="flex gap-2">
                    <button onclick="clearHistory()" title="Clear all download history" class="text-xs bg-red-800 hover:bg-red-700 text-red-200 py-1 px-3 rounded transition-colors">
                        Clear History
                    </button>
                    <button onclick="fetchHistory()" title="Refresh download history list" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 py-1 px-3 rounded transition-colors">
                        Refresh
                    </button>
                </div>
            </div>
            <!-- Multi-select Toolbar -->
            <div id="multiSelectToolbar" class="hidden flex justify-between items-center mb-4 bg-gray-800 p-2 rounded">
                <span id="selectedCount" class="text-sm font-bold ml-2">0 selected</span>
                <div class="flex gap-2">
                    <button onclick="retrySelected()" title="Retry selected downloads" class="text-xs bg-blue-600 hover:bg-blue-500 text-white py-1 px-3 rounded transition-colors">Retry</button>
                    <button onclick="deleteSelected()" title="Delete selected items from history" class="text-xs bg-red-600 hover:bg-red-500 text-white py-1 px-3 rounded transition-colors">Delete</button>
                </div>
            </div>
            
            <div id="historyList" class="flex flex-col gap-3 max-h-64 overflow-y-auto pr-2">
                <p class="text-sm text-gray-500">No recent downloads.</p>
            </div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
        <div class="glass p-6 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Settings</h2>
            
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Download Directory</label>
                <input type="text" id="settingDir" class="w-full bg-[#121212] border border-gray-700 text-white rounded p-2">
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Default Quality</label>
                <select id="settingQuality" class="w-full bg-[#121212] border border-gray-700 text-white rounded p-2">
                    <option value="bestvideo+bestaudio/best">Best Combined</option>
                    <option value="bestaudio/best">Audio Only</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Concurrent Downloads</label>
                <input type="number" id="settingConcurrent" min="1" max="10" class="w-full bg-[#121212] border border-gray-700 text-white rounded p-2">
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-1">Network Reconnect Attempts</label>
                <input type="number" id="settingRetries" min="0" max="10" class="w-full bg-[#121212] border border-gray-700 text-white rounded p-2">
            </div>
            
            <div class="flex justify-end gap-2">
                <button onclick="closeSettings()" title="Discard changes" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded">Cancel</button>
                <button onclick="saveSettings()" title="Save downloader settings" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const progressContainer = document.getElementById('progressContainer');
        const formatInput = document.getElementById('formatInput');
        const dirInput = document.getElementById('dirInput');
        const urlInput = document.getElementById('urlInput');
        const btnDownload = document.getElementById('btnDownload');
        let autoFetchingFormats = false;

        urlInput.addEventListener('input', () => {
            const urls = urlInput.value.split('\n').map(u => u.trim()).filter(Boolean);
            const isValid = urls.length > 0 && urls.every(u => /^https?:\/\//i.test(u));
            btnDownload.disabled = !isValid;
            
            if (isValid && !autoFetchingFormats && urls.length > 0) {
                // Determine if we need to auto-fetch
                if (formatInput.options.length <= 2) {
                    autoFetchingFormats = true;
                    fetchFormats().finally(() => { autoFetchingFormats = false; });
                }
            }
        });

        function playAlertSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch note
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        const chartData = {};
        const chartRefs = {};
        const currentSpeeds = {};
        window.lastHistoryData = [];

        function updateDashboardSummary() {
            let totalSpeedMB = 0;
            let activeCount = 0;
            
            for (let url in currentSpeeds) {
                if (currentSpeeds[url] > 0) {
                    totalSpeedMB += currentSpeeds[url];
                    activeCount++;
                }
            }
            
            document.getElementById('dashTotalSpeed').innerText = totalSpeedMB.toFixed(2) + ' MB/s';
            
            let startedCount = 0;
            if (window.lastHistoryData) {
                startedCount = window.lastHistoryData.filter(i => i.status === 'Started').length;
            }
            let queuedCount = Math.max(0, startedCount - activeCount);
            
            document.getElementById('dashActiveCount').innerText = `${activeCount} / ${queuedCount}`;
        }

        function createProgressElement(url) {
            const div = document.createElement('div');
            div.className = "bg-gray-900 border border-gray-800 p-4 rounded-lg flex items-start gap-3 select-none";
            const safeUrlId = `dl-${btoa(url).replace(/=/g, '')}`;
            div.id = safeUrlId;
            div.innerHTML = `
                <div class="mt-1 cursor-grab active:cursor-grabbing text-gray-500 hover:text-white transition-colors drag-handle" title="Drag to reorder">
                    <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-center mb-2 gap-4">
                        <div class="flex justify-between text-sm text-gray-400 w-full min-w-0">
                            <span class="filename truncate max-w-[70%]">Preparing...</span>
                            <span class="percent">0%</span>
                        </div>
                        <button onclick="cancelActiveDownload('${url}')" title="Stop and cancel this active download" class="bg-red-600 hover:bg-red-700 text-white text-xs py-1 px-3 rounded whitespace-nowrap transition-colors">
                            Cancel
                        </button>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2 mb-2">
                        <div class="progressBar bg-blue-500 h-2 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                    </div>
                    <div class="chart-container w-full h-12 mt-2 bg-[#0a0a0a] rounded border border-gray-800/50 overflow-hidden relative"></div>
                    <div class="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                        <span class="speed">0 MB/s</span>
                        <span class="eta">ETA: -</span>
                    </div>
                </div>
            `;
            progressContainer.appendChild(div);

            chartData[url] = [];
            const container = div.querySelector('.chart-container');
            const svg = d3.select(container).append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("preserveAspectRatio", "none");
            
            const g = svg.append("g");
            const path = g.append("path")
                .attr("fill", "none")
                .attr("stroke", "#3b82f6") // tailwind blue-500
                .attr("stroke-width", 1.5);
                
            const areaLayer = g.append("path")
                .attr("fill", "rgba(59, 130, 246, 0.2)");
                
            chartRefs[url] = { svg, path, areaLayer, container };

            return div;
        }

        function updateChart(url, speedStr) {
            if (!chartRefs[url]) return;
            // Parse speed: " 4.50MiB/s" -> 4.5
            let speedMatch = speedStr.match(/([\d\.]+)/);
            let val = speedMatch ? parseFloat(speedMatch[1]) : 0;
            if (speedStr.includes('KiB/s')) val = val / 1024;
            else if (speedStr.includes('GiB/s')) val = val * 1024;
            
            currentSpeeds[url] = val;
            updateDashboardSummary();
            
            chartData[url].push(val);
            if (chartData[url].length > 50) {
                chartData[url].shift();
            }
            
            const data = chartData[url];
            const { path, areaLayer, container } = chartRefs[url];
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const x = d3.scaleLinear().domain([0, 49]).range([0, width]);
            const maxY = d3.max(data) || 1;
            const y = d3.scaleLinear().domain([0, maxY]).range([height, 0]);
            
            const line = d3.line()
                .x((d, i) => x(i + (50 - data.length)))
                .y(d => y(d))
                .curve(d3.curveMonotoneX);
                
            const area = d3.area()
                .x((d, i) => x(i + (50 - data.length)))
                .y0(height)
                .y1(d => y(d))
                .curve(d3.curveMonotoneX);
                
            path.attr("d", line(data));
            areaLayer.attr("d", area(data));
        }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            progressContainer.classList.remove('hidden');
            document.getElementById('dashboardSummary').classList.remove('hidden');
            
            const safeUrlId = data.url ? `dl-${btoa(data.url).replace(/=/g, '')}` : null;
            let el = safeUrlId ? document.getElementById(safeUrlId) : null;
            
            if (!el && data.type !== 'error' && data.url) {
                el = createProgressElement(data.url);
            }

            if (data.type === 'progress' && el) {
                el.querySelector('.filename').innerText = data.filename.split('/').pop() || data.filename;
                el.querySelector('.percent').innerText = data.percent;
                el.querySelector('.speed').innerText = data.speed;
                el.querySelector('.eta').innerText = `ETA: ${data.eta}`;
                
                let pct = parseFloat(data.percent.replace(/\x1b\[.*?m/g, '').replace('%', '').trim());
                if(!isNaN(pct)) el.querySelector('.progressBar').style.width = `${pct}%`;

                updateChart(data.url, data.speed);

            } else if (data.type === 'finished') {
                if (data.url) currentSpeeds[data.url] = 0;
                updateDashboardSummary();
                showToast(`Finished downloading: ${data.filename.split('/').pop()}`);
                playAlertSound();
                if (el) {
                    el.querySelector('.percent').innerText = "100%";
                    el.querySelector('.progressBar').style.width = "100%";
                    el.querySelector('.speed').innerText = "Done";
                    el.querySelector('.eta').innerText = "";
                }
                setTimeout(fetchHistory, 1000);
            } else if (data.type === 'error') {
                if (data.url) currentSpeeds[data.url] = 0;
                updateDashboardSummary();
                showToast(`Error: ${data.message}`);
                console.error(data.url, data.message);
                if (el) el.remove();
                setTimeout(fetchHistory, 1000);
            }
        };

        // Theme management
        const body = document.body;
        function applyTheme(isHighContrast) {
            if(isHighContrast) {
                body.classList.add('high-contrast');
            } else {
                body.classList.remove('high-contrast');
            }
        }
        function toggleTheme() {
            const isHighContrast = !body.classList.contains('high-contrast');
            localStorage.setItem('highContrast', isHighContrast);
            applyTheme(isHighContrast);
        }
        applyTheme(localStorage.getItem('highContrast') === 'true');
        
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            fetch('/settings/')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('settingDir').value = data.preferred_download_directory || '/storage/emulated/0/Download';
                    document.getElementById('settingQuality').value = data.download_profile || 'bestvideo+bestaudio/best';
                    document.getElementById('settingConcurrent').value = data.max_concurrent_downloads || 5;
                    document.getElementById('settingRetries').value = data.network_reconnect_attempts || 3;
                });
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }
        
        function saveSettings() {
            const payload = {
                preferred_download_directory: document.getElementById('settingDir').value,
                download_profile: document.getElementById('settingQuality').value,
                max_concurrent_downloads: parseInt(document.getElementById('settingConcurrent').value) || 5,
                network_reconnect_attempts: parseInt(document.getElementById('settingRetries').value) || 3
            };
            fetch('/settings/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                dirInput.value = payload.preferred_download_directory;
                closeSettings();
                showToast("Settings saved.");
            });
        }
        
        // Load settings on boot
        fetch('/settings/')
            .then(res => res.json())
            .then(data => {
                const localDir = localStorage.getItem('downloadDirectory');
                if (localDir) {
                    dirInput.value = localDir;
                } else if(data.preferred_download_directory) {
                    dirInput.value = data.preferred_download_directory;
                }
            });

        // Save settings on blur
        dirInput.addEventListener('blur', () => {
            localStorage.setItem('downloadDirectory', dirInput.value);
            fetch('/settings/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    preferred_download_directory: dirInput.value,
                    download_profile: 'Always Best Quality',
                    max_concurrent_downloads: 5,
                    network_reconnect_attempts: 3
                })
            });
        });

        document.getElementById('saveDirBtn').addEventListener('click', () => {
            fetch('/settings/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    preferred_download_directory: dirInput.value,
                    download_profile: 'Always Best Quality',
                    max_concurrent_downloads: 5,
                    network_reconnect_attempts: 3
                })
            }).then(() => showToast("Directory saved."));
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        async function fetchFormats() {
            const urlsStr = document.getElementById('urlInput').value.trim();
            if (!urlsStr) return;
            const firstUrl = urlsStr.split('\n')[0].trim();
            if (!firstUrl) return;
            
            try {
                const res = await fetch('/formats/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: firstUrl })
                });
                const data = await res.json();
                
                if (data.formats) {
                    formatInput.innerHTML = '';
                    data.formats.forEach((f, i) => {
                        const opt = document.createElement('option');
                        opt.value = f.format_id;
                        opt.innerText = f.label;
                        if (i === 1) opt.selected = true; // Auto-highlight best specific resolution
                        formatInput.appendChild(opt);
                    });
                    showToast(`Formats fetched for: ${data.title}`);
                } else if (data.error) {
                    showToast("Failed to fetch formats.");
                }
            } catch (e) {
                console.error(e);
                showToast("Error fetching formats.");
            }
        }

        let currentDownloadUrl = null;
        let selectedHistoryItems = new Set();

        function toggleSelect(checkbox) {
            if (checkbox.checked) {
                selectedHistoryItems.add(checkbox.value);
            } else {
                selectedHistoryItems.delete(checkbox.value);
            }
            updateToolbar();
        }

        function updateToolbar() {
            const toolbar = document.getElementById('multiSelectToolbar');
            if (selectedHistoryItems.size > 0) {
                toolbar.classList.remove('hidden');
                document.getElementById('selectedCount').innerText = `${selectedHistoryItems.size} selected`;
            } else {
                toolbar.classList.add('hidden');
            }
        }

        async function retrySelected() {
            const urls = Array.from(selectedHistoryItems).map(id => {
                const parts = id.split('|');
                return parts.slice(0, -1).join('|');
            });
            const format = document.getElementById('formatSelect').value;
            const customDir = document.getElementById('dirInput').value.trim();

            try {
                const res = await fetch('/download/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls: urls, format: format, custom_directory: customDir })
                });
                
                if (res.ok) {
                    showToast("Retrying selected downloads...");
                    selectedHistoryItems.clear();
                    updateToolbar();
                    fetchHistory();
                } else {
                    showToast("Failed to retry downloads.");
                }
            } catch (e) {
                showToast("Error retrying downloads.");
            }
        }

        async function deleteSelected() {
            const items = Array.from(selectedHistoryItems).map(id => {
                const parts = id.split('|');
                return { url: parts.slice(0, -1).join('|'), timestamp: parseFloat(parts[parts.length-1]) };
            });

            try {
                const res = await fetch('/history/remove/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });
                if (res.ok) {
                    showToast("Selected items deleted.");
                    selectedHistoryItems.clear();
                    updateToolbar();
                    fetchHistory();
                }
            } catch(e) {
                showToast("Error deleting items.");
            }
        }

        async function fetchHistory() {
            try {
                const res = await fetch('/history/');
                const history = await res.json();
                window.lastHistoryData = history || [];
                updateDashboardSummary();

                const list = document.getElementById('historyList');
                if (history && history.length > 0) {
                    list.innerHTML = '';
                    history.forEach(item => {
                        const date = new Date(item.timestamp * 1000).toLocaleString();
                        const colorClass = item.status === 'Completed' ? 'text-green-400' : (item.status === 'Started' ? 'text-blue-400' : 'text-red-400');
                        
                        let icon = '';
                        if (item.status === 'Completed') {
                            icon = '<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                        } else if (item.status === 'Started') {
                            icon = '<svg class="w-4 h-4 mr-1 inline animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>';
                        } else {
                            icon = '<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                        }

                        const uniqueId = item.url + '|' + item.timestamp;
                        const isChecked = selectedHistoryItems.has(uniqueId) ? 'checked' : '';
                        
                        list.innerHTML += `
                            <div class="bg-gray-800 p-3 rounded-lg text-sm border border-gray-700 flex items-center gap-3">
                                <input type="checkbox" class="h-4 w-4 rounded border-gray-600 focus:ring-blue-500 rounded bg-gray-700 cursor-pointer" value="${uniqueId}" ${isChecked} onchange="toggleSelect(this)">
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-gray-200 truncate">${item.title}</div>
                                    <div class="flex justify-between mt-1 text-xs items-center">
                                        <span class="flex items-center ${colorClass}">${icon}${item.status}</span>
                                        <span class="text-gray-500">${date}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<p class="text-sm text-gray-500">No recent downloads.</p>';
                }
                updateToolbar();
            } catch (e) {}
        }
        
        async function clearHistory() {
            try {
                const res = await fetch('/history/clear/', { method: 'POST' });
                if (res.ok) {
                    showToast("History cleared.");
                    fetchHistory();
                } else {
                    showToast("Failed to clear history.");
                }
            } catch (e) {
                showToast("Error clearing history.");
            }
        }

        async function cancelActiveDownload(targetUrl) {
            if (!targetUrl) return;
            try {
                const res = await fetch('/cancel/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl })
                });
                if (res.ok) {
                    showToast("Cancel signal sent.");
                }
            } catch (e) {
                showToast("Failed to send cancel signal.");
            }
        }

        async function startDownload() {
            const urlsStr = document.getElementById('urlInput').value.trim();
            const format = formatInput.value;
            if (!urlsStr) return;
            
            const urls = urlsStr.split('\n').map(u => u.trim()).filter(u => u);
            if (urls.length === 0) return;

            try {
                const res = await fetch('/download/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls: urls, format: format, custom_directory: document.getElementById('dirInput').value.trim() })
                });
                
                if (res.ok) {
                    showToast("Download sequence initiated.");
                    // Reset UI
                    document.getElementById('urlInput').value = '';
                    btnDownload.disabled = true;
                    // Keep progressContainer intact to show active downloads
                    fetchHistory();
                } else {
                    showToast("Failed to start download.");
                }
            } catch (e) {
                console.error("Error starting download:", e);
                showToast("Error initiating download sequence.");
            }
        }

        // Call on load
        fetchHistory();
        setInterval(fetchHistory, 5000);

        // Initialize Sortable for the active downloads list
        new Sortable(document.getElementById('progressContainer'), {
            animation: 150,
            handle: '.drag-handle',
            ghostClass: 'opacity-50'
        });
    </script>
</body>
</html>
